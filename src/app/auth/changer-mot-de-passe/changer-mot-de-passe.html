<div class="first-login-page min-vh-100 d-flex align-items-center justify-content-center p-3">
  <div class="col-xl-4 col-lg-5 col-md-7">

    <div class="text-center mb-4 page-header">
      <div class="header-icon mx-auto mb-2">
        <i class="fas fa-shield-alt"></i>
      </div>
      <h1 class="fw-bold mt-2" style="font-size:1.5rem">
        Première connexion
      </h1>
      <p class="text-muted" style="font-size:0.82rem">
        Vous devez définir un nouveau mot de passe avant de continuer.
      </p>
    </div>

    <div class="card shadow-lg border-0 rounded-lg">
      <div class="card-body p-4 p-md-5">

        <h5 class="fw-bold mb-1 text-center">Nouveau mot de passe</h5>

        <p class="text-muted text-center mb-4" style="font-size:0.82rem">
          Bonjour <strong>{{ user?.prenom }}</strong>,
          choisissez un mot de passe securise.
        </p>

        <div *ngIf="erreurGlobal()" class="alert alert-danger py-2 mb-3" style="font-size:0.85rem">
          <i class="fas fa-exclamation-circle me-2"></i>
          {{ erreurGlobal() }}
        </div>

        <!-- PASSWORD -->
        <div class="mb-3">

          <label class="form-label fw-semibold">Nouveau mot de passe</label>

          <div class="input-group">
            <input
              [type]="showmotDePasse() ? 'text' : 'password'"
              class="form-control"
              [(ngModel)]="nouveaumotDePasse"
              placeholder="Minimum 8 caracteres"
              [class.is-invalid]="erreurs['password']"
            />

            <button type="button" class="btn btn-light btn-eye"
                    (click)="showmotDePasse.set(!showmotDePasse())">
              <i class="fas" [class.fa-eye]="!showmotDePasse()" [class.fa-eye-slash]="showmotDePasse()"></i>
            </button>
          </div>

          <div *ngIf="erreurs['password']" class="text-danger small mt-1">
            {{ erreurs['password'] }}
          </div>

          <!-- FORCE PASSWORD -->
          <div class="mt-2 d-flex align-items-center gap-2" *ngIf="nouveaumotDePasse">

            <div class="progress flex-fill" style="height:6px;">
              <div class="progress-bar bg-success"
                   [style.width.%]="forcemotDePasse * 25">
              </div>
            </div>

            <small>{{ forceLabel }}</small>
          </div>

        </div>

        <!-- CONFIRM PASSWORD -->
        <div class="mb-3">

          <label class="form-label fw-semibold">Confirmation</label>

          <div class="input-group">
            <input
              [type]="showConfirm() ? 'text' : 'password'"
              class="form-control"
              [(ngModel)]="confirmmotDePasse"
              [class.is-invalid]="erreurs['confirm']"
            />

            <button type="button" class="btn btn-light btn-eye"
                    (click)="showConfirm.set(!showConfirm())">
              <i class="fas" [class.fa-eye]="!showConfirm()" [class.fa-eye-slash]="showConfirm()"></i>
            </button>
          </div>

          <div *ngIf="erreurs['confirm']" class="text-danger small mt-1">
            {{ erreurs['confirm'] }}
          </div>

        </div>

        <button class="btn btn-primary w-100"
                (click)="soumettre()"
                [disabled]="loading()">

          {{ loading() ? 'Chargement...' : 'Valider' }}

        </button>

      </div>
    </div>

  </div>
</div>
