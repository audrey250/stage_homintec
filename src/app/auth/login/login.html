<div class="bg-gradient-primary min-vh-100 d-flex align-items-center justify-content-center p-3">
  <div class="col-xl-4 col-lg-5 col-md-7">

    <!-- Logo + Titre -->
    <div class="text-center mb-4">
      <img
        src="assets/homintec_logo.png"
        alt="Logo HOMINTEC"
        class="mb-3"
        style="height:70px; object-fit:contain;"
        onerror="this.style.display='none'"
      />
      <h1 class="text-white fw-bold" style="font-size:1.8rem; letter-spacing:2px;">
        HOMINTEC
      </h1>
      <p class="text-white-50 mb-0" style="font-size:0.8rem; letter-spacing:3px;">
        PLATEFORME RH
      </p>
    </div>

    <!-- Carte formulaire -->
    <div class="card shadow-lg border-0 rounded-lg">
      <div class="card-body p-4 p-md-5">

        <h4 class="text-center text-dark fw-bold mb-1">Connexion</h4>
        <p class="text-center text-muted mb-4" style="font-size:0.85rem;">
          Accédez à votre espace collaborateur
        </p>

        <!-- Message d'erreur -->
        <div
          *ngIf="errorMessage()"
          class="alert alert-danger d-flex align-items-center gap-2 py-2 mb-3"
          style="font-size:0.85rem;"
        >
          <i class="fas fa-exclamation-circle flex-shrink-0"></i>
          {{ errorMessage() }}
        </div>

        <!-- Formulaire -->
        <form (ngSubmit)="onSubmit()" #loginForm="ngForm">

          <!-- Email -->
          <div class="mb-3">
            <label class="form-label fw-semibold" style="font-size:0.88rem;">
              Adresse email
            </label>
            <div class="input-group">
              <span class="input-group-text bg-light border-end-0">
                <i class="fas fa-envelope text-muted"></i>
              </span>
              <input
                type="email"
                class="form-control border-start-0"
                [(ngModel)]="email"
                name="email"
                placeholder="votre@homintec.com"
                required
                autocomplete="email"
                [disabled]="loading()"
              />
            </div>
          </div>

          <!-- Mot de passe -->
          <div class="mb-3">
            <label class="form-label fw-semibold" style="font-size:0.88rem;">
              Mot de passe
            </label>
            <div class="input-group">
              <span class="input-group-text bg-light border-end-0">
                <i class="fas fa-lock text-muted"></i>
              </span>
              <input
                [type]="showmotDePasse() ? 'text' : 'password'"
                class="form-control border-start-0 border-end-0"
                [(ngModel)]="motDePasse"
                name="motDePasse"
                placeholder="••••••••"
                required
                autocomplete="current-password"
                [disabled]="loading()"
              />
              <button
                type="button"
                class="input-group-text bg-light border-start-0"
                (click)="showmotDePasse.set(!showmotDePasse())"
                [title]="showmotDePasse() ? 'Masquer' : 'Afficher'"
              >
                <i class="fas"
                   [class.fa-eye]="!showmotDePasse()"
                   [class.fa-eye-slash]="showmotDePasse()">
                </i>
              </button>
            </div>
          </div>

          <!-- Mot de passe oublié -->
          <div class="text-end mb-4">
          <a  
              routerLink="/mot-de-passe-oublie"
              class="text-muted"
              style="font-size:0.82rem; text-decoration:none;"
            >
              <i class="fas fa-key me-1"></i>Mot de passe oublié ?
            </a>
          </div>

          <!-- Bouton connexion -->
          <button
            type="submit"
            class="btn btn-primary w-100 py-2 fw-semibold"
            [disabled]="loading()"
          >
            <span
              *ngIf="loading()"
              class="spinner-border spinner-border-sm me-2"
            ></span>
            <i *ngIf="!loading()" class="fas fa-sign-in-alt me-2"></i>
            {{ loading() ? 'Connexion en cours...' : 'Se connecter' }}
          </button>

        </form>

      </div>
    </div>

    <!-- Pied de page -->
    <div class="text-center mt-3">
      <p class="text-white-50" style="font-size:0.75rem;">
        © 2024 HOMINTEC — Plateforme RH Collaborative
      </p>
    </div>

  </div>
</div>
