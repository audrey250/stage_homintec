<nav class="navbar navbar-expand navbar-light bg-white topbar static-top shadow-sm">

  <!-- Bouton toggle sidebar (visible sur tous les appareils) -->
  <button class="btn btn-sidebar-toggle me-2 me-md-3" (click)="toggle()" title="Toggle Sidebar">
    <i class="fas fa-fw fa-bars"></i>
  </button>

  <!-- Éléments à droite -->
  <div class="ms-auto d-flex align-items-center gap-2 gap-sm-3">

    <!-- Divider -->
    <div class="topbar-divider d-none d-sm-block"></div>

    <!-- Menu utilisateur -->
    <div class="nav-item dropdown no-arrow" [class.show]="dropdownOpen">

      <button
        type="button"
        class="nav-link user-profile-link d-flex align-items-center gap-2 gap-lg-3 border-0 bg-transparent"
        [attr.aria-expanded]="dropdownOpen"
        aria-haspopup="true"
        (click)="toggleDropdown($event)"
      >

        <!-- Nom + badge rôle (visible en desktop) -->
        <div class="user-info d-none d-lg-flex flex-column align-items-end">
          <div class="user-name fw-semibold">
            {{ authService.currentUser()?.prenom }}
            {{ authService.currentUser()?.nom }}
          </div>
          <span class="user-role badge"
            [ngClass]="{
              'bg-secondary': authService.currentUser()?.Poste === 'employe',
              'bg-info':      authService.currentUser()?.Poste === 'manager',
              'bg-success':   authService.currentUser()?.Poste === 'rh',
              'bg-danger':    authService.currentUser()?.Poste === 'admin'
            }">
            {{ authService.currentUser()?.Poste | uppercase }}
          </span>
        </div>

        <!-- Avatar -->
        <div class="user-avatar">
          {{ authService.currentUser()?.prenom?.charAt(0) }}{{ authService.currentUser()?.nom?.charAt(0) }}
        </div>
      </button>

      <!-- Dropdown Menu -->
      <div class="dropdown-menu dropdown-menu-end user-dropdown"
           [class.show]="dropdownOpen"
         (click)="$event.stopPropagation()">
        
        <!-- Header du dropdown -->
        <div class="dropdown-header border-bottom pb-3">
          <div class="d-flex align-items-center gap-3">
            <div class="user-avatar-lg">
              {{ authService.currentUser()?.prenom?.charAt(0) }}{{ authService.currentUser()?.nom?.charAt(0) }}
            </div>
            <div class="dropdown-user-meta">
              <div class="fw-bold dropdown-user-name">{{ authService.currentUser()?.prenom }} {{ authService.currentUser()?.nom }}</div>
              <div class="text-muted small dropdown-user-email">{{ authService.currentUser()?.email }}</div>
              <div class="mt-2">
                <span class="badge"
                  [ngClass]="{
                    'bg-secondary': authService.currentUser()?.Poste === 'employe',
                    'bg-info':      authService.currentUser()?.Poste === 'manager',
                    'bg-success':   authService.currentUser()?.Poste === 'rh',
                    'bg-danger':    authService.currentUser()?.Poste === 'admin'
                  }">
                  {{ authService.currentUser()?.Poste | uppercase }}
                </span>
              </div>
            </div>
          </div>
        </div>

        <!-- Menu items -->
        <a class="dropdown-item" routerLink="/profil"
           (click)="dropdownOpen = false">
          <i class="fas fa-user fa-fw me-2 text-primary"></i>
          Mon profil
        </a>

        <a class="dropdown-item" routerLink="/messagerie"
           (click)="dropdownOpen = false">
          <i class="fas fa-envelope fa-fw me-2 text-primary"></i>
          Messagerie
        </a>

        <div class="dropdown-divider"></div>

        <a class="dropdown-item text-danger" href="#"
           (click)="$event.preventDefault(); logout()">
          <i class="fas fa-sign-out-alt fa-fw me-2"></i>
          Déconnexion
        </a>
      </div>

    </div>
  </div>
</nav>
